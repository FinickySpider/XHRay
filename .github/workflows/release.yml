name: Release XHRay

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build userscript
        run: npm run build

      - name: Rename built file with version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          OUTPUT="xhray-telemetry-correlator_${VERSION}.user.js"
          mv dist/xhray.user.js "$OUTPUT"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "OUTPUT=$OUTPUT" >> $GITHUB_ENV

      - name: Zip release
        run: |
          zip "xhray-telemetry-correlator_${{ env.VERSION }}.zip" ${{ env.OUTPUT }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: xhray-telemetry-correlator_${{ env.VERSION }}
          tag_name: ${{ env.VERSION }}
          files: |
            xhray-telemetry-correlator_${{ env.VERSION }}.user.js
            xhray-telemetry-correlator_${{ env.VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}