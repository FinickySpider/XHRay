<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>XHRay Changelog</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: auto; padding: 2em; background: #111; color: #eee; }
    h1, h2, h3 { color: #f90; }
    pre { background: #222; padding: 1em; border-radius: 6px; overflow-x: auto; }
    a { color: #0bf; }
  </style>
</head>
<body>
  <h1>📦 XHRay Changelog Viewer</h1>
  <div id="changelog">Loading...</div>

  <script>
    fetch('CHANGELOG.md')
      .then(r => r.text())
      .then(md => {
        const html = md
          .replace(/^### (.*?)$/gm, '<h3>$1</h3>')
          .replace(/^## (.*?)$/gm, '<h2>$1</h2>')
          .replace(/^# (.*?)$/gm, '<h1>$1</h1>')
          .replace(/^\*\*([^*]+)\*\*/g, '<b>$1</b>')
          .replace(/\n/g, '<br>');
        document.getElementById("changelog").innerHTML = html;
      });
  </script>
</body>
</html>
